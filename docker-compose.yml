version: '3.8'

services:
  ecommerce-app:
    build: .
    container_name: ecommerce-catalog
    ports:
      - "8080:8080"
    environment:
      # Override the JWT secret via environment variable in production
      - APP_JWT_SECRET=ecommerce-catalog-secret-key-change-me-in-production-min-32-chars
      - APP_JWT_EXPIRATION_MS=86400000
    restart: unless-stopped
