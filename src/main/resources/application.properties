# =============================================
# Application
# =============================================
spring.application.name=ecommerce-catalog
server.port=8080

# =============================================
# H2 In-Memory Database (Development)
# =============================================
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console ? http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =============================================
# Seed data
# =============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# =============================================
# Jackson (JSON serialization)
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# =============================================
# JWT Authentication
# =============================================
app.jwt.secret=ecommerce-catalog-secret-key-change-me-in-production-min-32-chars
app.jwt.expiration-ms=86400000

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# Logging
# =============================================
logging.level.com.portfolio.ecommerce=DEBUG
logging.level.org.hibernate.SQL=DEBUG