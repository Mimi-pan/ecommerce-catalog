# =============================================
# Application
# =============================================
spring.application.name=ecommerce-catalog
server.port=8080

# =============================================
# H2 In-Memory Database
# Swap these for PostgreSQL in production
# =============================================
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (useful during development: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =============================================
# Seed data
# =============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# =============================================
# Jackson (JSON serialization)
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# =============================================
# Logging
# =============================================
logging.level.com.portfolio.ecommerce=DEBUG
logging.level.org.hibernate.SQL=DEBUG
